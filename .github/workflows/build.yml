name: Build
on:
  push:
    branches:
      - main
      - v0.9.x
    tags:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - "**"
permissions:
  contents: write
  packages: write
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run tests
        run: make test

      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: coverage

  integration-test:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run integration tests
        run: make integration-test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Require: The version of golangci-lint to use.
          # When `install-mode` is `binary` (default) the value can be v1.2 or v1.2.3 or `latest` to use the latest version.
          # When `install-mode` is `goinstall` the value can be v1.2.3, `latest`, or the hash of a commit.
          version: v2.10.1

          # Optional: golangci-lint command line arguments.
          #
          # Note: By default, the `.golangci.yml` file should be at the root of the repository.
          # The location of the configuration file can be changed by using `--config=`
          args: --timeout=30m --config=.golangci.yml

  coverage:
    if: github.event_name == 'pull_request' # Do not run when workflow is triggered by push to main branch
    runs-on: ubuntu-latest
    needs: test # Depends on the artifact uploaded by the "test" job
    permissions:
      contents: read
      actions: read # to download code coverage results from "test" job
      pull-requests: write # write permission needed to comment on PR
    steps:
      - uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: "code-coverage"
          coverage-file-name: "coverage"
          root-package: "github.com/xataio/pgstream"

  license-check:
    name: license check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Ensure .go files have a license reference
        run: make license-check

  code-generation:
    name: code generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Generate code
        run: make generate

      - name: Ensure generated code is up-to-date
        run: |
          if ! git diff --quiet; then
            echo "generated code is out of date!"
            echo "run 'make generate' to regenerate"
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: [test, integration-test, lint, license-check]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # create the GitHub release and upload artifacts
      packages: write # push images to ghcr.io
      id-token: write # request the OIDC token used to sign attestations
      attestations: write # write GitHub artifact attestations
      artifact-metadata: write # create the artifact metadata storage records that accompany attestations
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # We use two github tokens here:
          # * The actions-bound `GITHUB_TOKEN` with permissions to write packages.
          # * The org level `GIT_TOKEN` to be able to publish the brew tap file.
          # See: https://goreleaser.com/errors/resource-not-accessible-by-integration/
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          DOCKER_USERNAME: ghcr.io/${{ github.repository_owner }}

      # Signed build provenance for the released binaries/archives.
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/pgstream.*"

      # Resolve the pushed multi-arch manifest digest so the image attestations
      # cover the exact content (image tags have no "v" prefix).
      - name: Resolve image digest
        id: image
        run: |
          NAME="ghcr.io/${{ github.repository_owner }}/pgstream"
          DIGEST="$(docker buildx imagetools inspect "${NAME}:${GITHUB_REF_NAME#v}" --format '{{.Manifest.Digest}}')"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # Signed build provenance for the container image, pushed to ghcr.io.
      - name: Attest container image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      # Generate an SPDX SBOM for the image (anchore/sbom-action manages syft
      # internally) and attach it as a signed attestation, pushed to ghcr.io.
      - name: Generate container image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.image.outputs.digest }}
          format: spdx-json
          output-file: pgstream.image.sbom.spdx.json

      - name: Attest container image SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          sbom-path: pgstream.image.sbom.spdx.json
          push-to-registry: true
