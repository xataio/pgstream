name: Nightly
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # Skip the run if main has not changed in the last day, unless triggered
  # manually via workflow_dispatch.
  check:
    name: check for new commits
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for commits in the last 24h
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual trigger, running"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "new commits found, running"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "no new commits in the last 24h, skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  nightly:
    name: build and publish nightly
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
      IMAGE: ghcr.io/${{ github.repository_owner }}/pgstream
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Validate nightly config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: check --config=.goreleaser.nightly.yaml

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --snapshot --config=.goreleaser.nightly.yaml
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          DOCKER_USERNAME: ghcr.io/${{ github.repository_owner }}

      - name: Push images and manifests
        id: push
        run: |
          set -euo pipefail
          # GoReleaser is the source of truth for the version string, which is
          # "nightly-<date>-<sha>". Derive the "nightly-<date>" tag from it so
          # the date never drifts between GoReleaser and this step.
          version="$(jq -r '.version' dist/metadata.json)"
          date_tag="${version%-*}"

          docker push "${IMAGE}:${version}-amd64"
          docker push "${IMAGE}:${version}-arm64v8"

          # nightly              -> moving, always latest
          # nightly-<date>       -> latest build for that day
          # nightly-<date>-<sha> -> immutable, matches the binary version string
          for tag in nightly "${date_tag}" "${version}"; do
            docker manifest create "${IMAGE}:${tag}" \
              "${IMAGE}:${version}-amd64" \
              "${IMAGE}:${version}-arm64v8"
            docker manifest push "${IMAGE}:${tag}"
          done

          digest="$(docker buildx imagetools inspect "${IMAGE}:nightly" --format '{{ .Manifest.Digest }}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Publish binaries to a single rolling "nightly" prerelease. The tag is
      # force-moved to the current commit so the release always reflects HEAD.
      - name: Publish rolling nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git push --force origin "HEAD:refs/tags/nightly"

          mkdir -p dist/release
          jq -r '.[]
                 | select(.name | test("^pgstream\\.[a-z]+\\."))
                 | [.path, .name] | @tsv' \
            dist/artifacts.json \
            | while IFS=$'\t' read -r path name; do
                cp "$path" "dist/release/$name"
              done
          if [ -z "$(ls -A dist/release)" ]; then
            echo "no binaries matched; artifacts.json contained:"
            jq -r '.[] | "\(.type)\t\(.name)"' dist/artifacts.json
            exit 1
          fi

          version="$(jq -r '.version' dist/metadata.json)"
          ( cd dist/release && sha256sum pgstream.* > "pgstream_${version}_checksums.txt" )

          echo "release assets:"
          ls -1 dist/release

          gh release delete nightly --yes || true
          gh release create nightly \
            --prerelease \
            --title "Nightly build" \
            --notes "Automated nightly build from \`main\` (${GITHUB_SHA:0:7}). These artifacts are unstable and intended for testing only." \
            dist/release/*
